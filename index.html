<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milena Moena Moreno</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        .background {
            position: fixed;
            inset: 0;
        }

        .background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title {
            position: absolute;
            top: 32px;
            left: 32px;
            color: white;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .title h1 {
            font-size: 1.8rem;
            font-weight: normal;
            line-height: 1.1;
        }

        .title p {
            margin-top: 4px;
            font-size: 1rem;
            font-weight: normal;
        }

        @media (max-width: 600px) {
            .title {
                top: 20px;
                left: 20px;
            }

            .title h1 {
                font-size: 1.4rem;
            }

            .title p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <img src="./imagenes/anillos.jpg" alt="anillos">
    </div>

    <div class="title">
        <h1>Milena Moena Moreno</h1>
        <p>Artista visual</p>
    </div>

</body>
</html>
